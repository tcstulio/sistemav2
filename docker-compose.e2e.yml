# Stack de E2E LOCAL (Modo B) — Dolibarr do NOSSO FORK + MariaDB, para validação profunda on-demand.
# NÃO roda na CI (repo público): dados reais/PII ficam só na sua máquina.
#
# Uso:
#   docker compose -f docker-compose.e2e.yml up -d --build   # builda o fork + sobe Dolibarr (8088) + DB
#   #   1ª vez: builda a imagem do fork + o auto-install cria o schema (alguns min). Acompanhe os logs.
#   #   então rode:  npm run test:e2e:local
#   docker compose -f docker-compose.e2e.yml down            # derruba (use -v para apagar o volume/DB)
#
# Fonte do Dolibarr: BUILD a partir do NOSSO FORK (../dolibarr, v21.0.1) — NÃO a imagem baunilha.
# Ver Dockerfile.e2e (o fork tem módulos/endpoints/patches custom que o app depende).
services:
  e2e-db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: dolibarr
      MARIADB_USER: dolibarr
      MARIADB_PASSWORD: dolibarr
    volumes:
      - e2e-dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  e2e-dolibarr:
    # BUILD do fork (../dolibarr = build context, htdocs na raiz). NÃO `image: dolibarr/dolibarr:21`:
    # a baunilha não tem nossos módulos/endpoints/patches → o app quebraria (falsa confiança).
    build:
      context: ../dolibarr
      dockerfile: ../sistemav2/Dockerfile.e2e
    depends_on:
      e2e-db:
        condition: service_healthy
    ports:
      - "8088:80"
    environment:
      DOLI_DB_TYPE: mysqli
      DOLI_DB_HOST: e2e-db
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: dolibarr
      DOLI_ADMIN_LOGIN: admin
      DOLI_ADMIN_PASSWORD: e2eadmin
      DOLI_URL_ROOT: "http://localhost:8088"
      DOLI_INSTALL_AUTO: "1"
      # Chave CERTA é DOLI_ENABLE_MODULES (nomes SEM prefixo `mod`); `DOLI_MODULES` é ignorada.
      # Ficheinter/Contrat entram porque o app usa /interventions e contratos.
      # Product/Propal/Commande adicionados p/ o piloto de cotação (Fase 4): cotação = proposta
      # (Propal) com produtos (Product); pedido (Commande) é o passo seguinte natural.
      DOLI_ENABLE_MODULES: "Api,Societe,Facture,Projet,Contrat,Ficheinter,Product,Propale,Commande"
      # Sem estes o install NÃO ativa os módulos (causa provável do shakeout de 1ª vez).
      DOLI_COMPANY_NAME: "E2E Sandbox"
      DOLI_COMPANY_COUNTRYCODE: "BR"
      # DOLI_INIT_DEMO está quebrado em versões recentes (Dolibarr #32146) — seed via app/dump, não demo.
      DOLI_INIT_DEMO: "0"

volumes:
  e2e-dbdata:
