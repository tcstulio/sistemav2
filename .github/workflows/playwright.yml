name: E2E Tests

# Na CI NÃO há backend nem Dolibarr → rodamos só os SMOKE tests (backend-independentes: o frontend
# sobe, o React monta, sem erros críticos). O E2E COMPLETO (auth, navegação, fluxos internos) roda
# LOCALMENTE contra um Dolibarr real — ver docs/E2E_LOCAL.md (Modo B: `npm run test:e2e:local`).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (não ci): lockfile gerado em dev Windows; deps opcionais por plataforma quebram `npm ci`.
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      # Só smoke (backend-independente) na CI; E2E completo é local (Modo B).
      - run: npx playwright test tests/smoke.spec.ts --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
