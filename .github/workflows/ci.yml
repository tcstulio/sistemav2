name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # npm install (não ci): o lockfile é gerado em dev Windows e o CI é Linux;
      # deps opcionais por plataforma (ex.: @emnapi/runtime) faltam no lock e
      # quebram `npm ci`. `npm install` reconcilia na instalação.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: npm run build
